<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aegis-Edge — Counter-UAS 3D</title>
    <style>
      :root { color-scheme: dark; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #app { width: 100%; height: 100%; overflow: hidden; background: #06080d; }
      body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; }
      #hud {
        position: fixed; top: 16px; left: 16px; z-index: 10; color: #cfe3ff;
        background: rgba(10,16,28,.72); border: 1px solid rgba(80,140,220,.25);
        border-radius: 10px; padding: 12px 14px; backdrop-filter: blur(6px); max-width: 320px;
      }
      #hud h1 { font-size: 14px; letter-spacing: .12em; color: #8fb6ff; font-weight: 700; }
      #hud .sub { font-size: 11px; color: #6f87ad; margin-top: 2px; }
      #panel {
        position: fixed; top: 16px; right: 16px; z-index: 10; width: 340px; color: #d7e6ff;
        background: rgba(10,16,28,.72); border: 1px solid rgba(80,140,220,.25);
        border-radius: 10px; padding: 14px; backdrop-filter: blur(6px); display: none;
      }
      #panel.show { display: block; }
      #panel .tag { display:inline-block; font-size:10px; letter-spacing:.1em; padding:2px 8px; border-radius:999px; }
      .threat-HIGH { background:#3a0d12; color:#ff6b78; border:1px solid #ff6b78; }
      .threat-MED  { background:#3a2a0d; color:#ffc14d; border:1px solid #ffc14d; }
      .threat-LOW  { background:#0d2a1f; color:#5dd6a0; border:1px solid #5dd6a0; }
      .threat-NONE { background:#1a2233; color:#8fb6ff; border:1px solid #4a6da8; }
      #panel h2 { font-size: 15px; margin: 8px 0 4px; }
      #panel .why { font-size: 12.5px; line-height: 1.5; color: #b9cbe6; margin-top: 8px; }
      #panel .src { display:inline-block; font-size:9.5px; letter-spacing:.08em; text-transform:uppercase;
        padding:1px 6px; border-radius:999px; margin-right:6px; vertical-align:1px; }
      #panel .src-ai  { background:#0d2233; color:#5fc8ff; border:1px solid #2f6f9e; }
      #panel .src-off { background:#22283a; color:#8aa3c7; border:1px solid #45506e; }
      #panel .row { font-size: 12px; color:#8aa3c7; margin-top:6px; display:flex; justify-content:space-between; }
      /* --- T7 human-gate: 2-person authorization for a recommend-only DEFEAT --- */
      #panel .gate { margin-top: 12px; padding: 10px; border-radius: 8px;
        background: rgba(58,13,18,.5); border: 1px solid #ff6b78; }
      #panel .gate-h { font-size: 11px; font-weight: 700; letter-spacing: .06em; color: #ff8a94;
        display: flex; align-items: center; gap: 6px; }
      #panel .gate-ops { display: flex; gap: 8px; margin-top: 10px; }
      #panel .op { flex: 1; font: 600 11px/1 ui-sans-serif, system-ui, sans-serif; cursor: pointer;
        padding: 7px 6px; border-radius: 6px; background: #14202f; color: #9db4d6;
        border: 1px solid #45506e; transition: all .12s; }
      #panel .op:hover { border-color: #6f87ad; }
      #panel .op.armed { background: #0d2a1f; color: #7df0b8; border-color: #5dd6a0; }
      #panel .gate-act { display: flex; gap: 8px; margin-top: 8px; }
      #panel .auth, #panel .deny { flex: 1; font: 700 11px/1 ui-sans-serif, system-ui, sans-serif;
        cursor: pointer; padding: 8px 6px; border-radius: 6px; letter-spacing: .04em; }
      #panel .auth { background: #3a0d12; color: #ff6b78; border: 1px solid #ff6b78; }
      #panel .auth:disabled { opacity: .4; cursor: not-allowed; }
      #panel .auth:not(:disabled):hover { background: #ff6b78; color: #1a0507; }
      #panel .deny { background: #14202f; color: #9db4d6; border: 1px solid #45506e; }
      #panel .deny:hover { border-color: #8fb6ff; color: #cfe3ff; }
      #panel .gate-status { font-size: 10.5px; color: #8aa3c7; margin-top: 8px; }
      #panel .gate-status.authd { color: #ff8a94; font-weight: 700; }
      #panel .gate-status.denied { color: #7df0b8; font-weight: 700; }
      #panel .gate-llm { font-size: 9px; letter-spacing: .08em; text-transform: uppercase; color: #6f87ad;
        margin-top: 8px; display: inline-block; padding: 1px 6px; border-radius: 999px;
        border: 1px solid #2f4a3a; background: #0d2018; }
      #hint { position: fixed; bottom: 14px; left: 16px; z-index: 10; font-size: 11px; color: #5f7799; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">
      <h1>AEGIS-EDGE</h1>
      <div class="sub">Counter-UAS · 1 km² · explainable threat-call at the edge</div>
      <div class="sub" id="clock" style="margin-top:6px;"></div>
      <div class="sub" id="ledger" style="margin-top:2px;">audit ledger · 0 entries</div>
    </div>
    <div id="panel"></div>
    <div id="hint">drag to orbit · scroll to zoom · click a track for the AI threat-call</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
